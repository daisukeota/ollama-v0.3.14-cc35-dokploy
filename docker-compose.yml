services:
  ollama-v0314:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-k40c-v0314
    ports:
      - "11434:11434"
    volumes:
      - ollama_v0314_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama_v0314_data: